# ──────────────────────────────────────────────────────────────────────────────
# Frontend Service — NodePort
# Exposes the Nginx container to your host browser on port 30300
#   Access via: http://<minikube-ip>:30300
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: edumentor
  labels:
    app: frontend
    tier: web
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      protocol: TCP
      port: 80              # ClusterIP port (used internally by Ingress)
      targetPort: 80        # Nginx container port
      nodePort: 30300       # External access: http://<minikube-ip>:30300
