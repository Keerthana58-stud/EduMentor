# ──────────────────────────────────────────────────────────────────────────────
# Frontend Deployment — Nginx serving the built React/Vite app
# Nginx also proxies /api/* → backend-service:8000 (see frontend/nginx.conf)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: edumentor
  labels:
    app: frontend
    tier: web
spec:
  replicas: 2                         # 2 replicas for availability
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      containers:
        - name: frontend
          image: edumentor-frontend:latest
          imagePullPolicy: IfNotPresent              
          ports:
            - containerPort: 80
              name: http

          # ── Resource limits ──────────────────────────────────────────────────
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

          # ── Liveness probe ───────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # ── Readiness probe ──────────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
