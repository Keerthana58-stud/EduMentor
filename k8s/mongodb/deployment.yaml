# ──────────────────────────────────────────────────────────────────────────────
# MongoDB Deployment — single replica (stateful workloads use StatefulSet in
# production, but for local Minikube a Deployment + PVC is sufficient)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  namespace: edumentor
  labels:
    app: mongodb
    tier: database
spec:
  replicas: 1                         # MongoDB must stay at 1 replica with hostPath PV
  selector:
    matchLabels:
      app: mongodb
  strategy:
    type: Recreate                    # Kill old pod before starting new one (safe for PV)
  template:
    metadata:
      labels:
        app: mongodb
        tier: database
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0             # Official MongoDB image, pinned to major version
          ports:
            - containerPort: 27017
              name: mongo

          # ── Resource limits ─────────────────────────────────────────────────
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # ── Mount persistent storage ─────────────────────────────────────────
          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db      # Default MongoDB data directory

          # ── Liveness probe — restarts pod if MongoDB stops responding ────────
          livenessProbe:
            exec:
              command:
                - mongosh
                - "--eval"
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3

          # ── Readiness probe — only routes traffic when MongoDB is ready ───────
          readinessProbe:
            exec:
              command:
                - mongosh
                - "--eval"
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      volumes:
        - name: mongodb-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc    # References the PVC in mongodb/pvc.yaml
