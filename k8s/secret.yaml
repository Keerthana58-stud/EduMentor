# ──────────────────────────────────────────────────────────────────────────────
# Secret — sensitive credentials stored as base64-encoded values
#
# HOW TO ENCODE YOUR REAL VALUES:
#   PowerShell:  [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("your-value"))
#   Linux/macOS: echo -n "your-value" | base64
#
# Current placeholder values below:
#   JWT_SECRET  = "supersecret12345"
#   GROQ_API_KEY = "<your-actual-key>"  ← replace before applying!
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: edumentor-secrets
  namespace: edumentor
  labels:
    app: edumentor
type: Opaque
stringData:
  JWT_SECRET: supersecret12345
  GROQ_API_KEY: your-groq-api-key-here
